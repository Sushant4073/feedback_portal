version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: feedback-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedback_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # LocalStack with Lambda provider config
  localstack:
    image: localstack/localstack:latest
    container_name: localstack-main
    ports:
      - "4566:4566"  # Edge service
      - "4510-4559:4510-4559"
    environment:
      SERVICES: lambda,apigateway,sqs,s3
      PERSISTENCE: 1
      LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT: 60
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-west-2
      AWS_DEFAULT_REGION: us-west-2
      # Use Lambda V2 provider
      LAMBDA_PROVIDER_V2: false
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack

  # Local LLM for feedback auto-categorization
  ollama:
    image: ollama/ollama:latest
    container_name: feedback-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  localstack_data:
  ollama_data: